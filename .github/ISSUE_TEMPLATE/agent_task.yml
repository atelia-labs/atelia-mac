name: Agent task
description: A scoped Atelia Mac task for a coding agent.
title: "[Agent Task]: "
labels: ["type: agent-task", "agent: ready", "needs: triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
    validations:
      required: true
  - type: textarea
    id: required_reading
    attributes:
      label: Required reading before implementation
      value: |
        - [ ] `README.md`
        - [ ] `Package.swift`
        - [ ] Related `atelia-kit` interfaces if shared logic is touched
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: self_review
    attributes:
      label: Required self-review before PR
      value: |
        - [ ] The diff is scoped to this issue.
        - [ ] I considered local file, terminal, repository, approval, hook, automation, and extension impact.
        - [ ] I ran or documented the relevant verification.
        - [ ] I listed follow-up work or confirmed none is needed.
    validations:
      required: true

